sonar.projectKey=rohanvinaik_Prism
sonar.organization=rohanvinaik

sonar.projectName=Prism
sonar.projectVersion=0.5.0

# Source layout
sonar.sources=src/
sonar.tests=tests/
sonar.python.version=3.11

# Coverage report (generated by pytest-cov in CI)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=\
  **/.claude/**,\
  **/.lintgate/**,\
  **/__pycache__/**,\
  **/*.md

# Don't flag test files for duplication or complexity
sonar.cpd.exclusions=tests/**

# Coverage exclusions — MCP server wrappers are thin dispatch
sonar.coverage.exclusions=\
  tests/**,\
  src/prism/server.py

# Treat these as test sources
sonar.test.inclusions=tests/**/*.py
